<!DOCTYPE html>
<html lang="fr">
<head>
<script>
(function () {
  try {
    var region = localStorage.getItem('zoli_bazar_region');
    if (!region) {
      document.documentElement.classList.add('needs-onboarding');
    }
  } catch (e) {
    document.documentElement.classList.add('needs-onboarding');
  }
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Zoli Bazar</title>
<meta name="description" content="Zoli Bazar — la boutique en ligne de l'Océan Indien.">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Zoli Bazar">
<link rel="manifest" href="/manifest.json">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --color-black: #111111;
  --color-white: #ffffff;
  --color-grey-light: #f5f5f4;
  --color-grey-mid: #e4e3e0;
  --color-grey-text: #706e6a;
  --color-accent: #c98a3e;
  --color-accent-dark: #a8702e;
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
  --radius-lg: 22px;
  --radius-md: 16px;
  --radius-sm: 10px;
  --shadow-soft: 0 24px 60px -24px rgba(17, 17, 17, 0.35);
  --header-height: 64px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: var(--color-grey-mid);
  font-family: var(--font-body);
  color: var(--color-black);
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

.app-frame {
  position: relative;
  width: 100%;
  max-width: 450px;
  min-height: 100vh;
  height: 100vh;
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--color-white);
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.app-frame::-webkit-scrollbar { display: none; }

@media (min-width: 451px) {
  body { align-items: center; padding: 32px 0; }
  .app-frame {
    height: 90vh;
    min-height: 640px;
    max-height: 900px;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-soft);
  }
}

header.app-header {
  position: sticky;
  top: 0;
  z-index: 20;
  height: var(--header-height);
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: saturate(180%) blur(14px);
  -webkit-backdrop-filter: saturate(180%) blur(14px);
  border-bottom: 1px solid var(--color-grey-mid);
}

header.app-header .logo {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 19px;
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  gap: 8px;
}

header.app-header .logo__mark {
  flex-shrink: 0;
}

.cart-button {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: none;
  background: var(--color-grey-light);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.cart-button svg { width: 18px; height: 18px; }

.cart-badge {
  position: absolute;
  top: -4px;
  right: -4px;
  min-width: 18px;
  height: 18px;
  padding: 0 4px;
  border-radius: 9px;
  background: var(--color-accent);
  color: var(--color-white);
  font-size: 10.5px;
  font-weight: 700;
  display: none;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

.cart-badge.is-visible { display: flex; }

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

main.shop {
  padding: 20px 20px 48px;
}

.culture-banner {
  background: var(--color-black);
  color: var(--color-white);
  border-radius: var(--radius-md);
  padding: 26px 24px;
  margin-bottom: 28px;
}

.culture-banner .eyebrow {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--color-accent);
  font-weight: 600;
  margin: 0 0 8px;
}

.culture-banner h1 {
  font-family: var(--font-display);
  font-size: 27px;
  line-height: 1.15;
  margin: 0 0 8px;
  font-weight: 700;
}

.culture-banner p {
  margin: 0;
  font-size: 14.5px;
  line-height: 1.5;
  color: rgba(255, 255, 255, 0.72);
}

.section-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--color-grey-text);
  margin: 0 0 16px;
}

.product-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.product-card {
  display: flex;
  flex-direction: column;
  border-radius: var(--radius-md);
  overflow: hidden;
  background: var(--color-white);
  border: 1px solid var(--color-grey-mid);
}

.product-card__image {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  background: var(--color-grey-light);
  display: block;
}

.product-card__body {
  padding: 12px 12px 14px;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
}

.product-card__title {
  font-size: 13.5px;
  font-weight: 600;
  margin: 0 0 4px;
  line-height: 1.3;
}

.product-card__desc {
  font-size: 12px;
  color: var(--color-grey-text);
  line-height: 1.4;
  margin: 0 0 10px;
  flex-grow: 1;
}

.product-card__price {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 14.5px;
  margin: 0 0 10px;
}

.product-card__cta {
  border: none;
  background: var(--color-accent);
  color: var(--color-white);
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 12.5px;
  padding: 10px 0;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.15s ease, transform 0.1s ease;
}

.product-card__cta:active { transform: scale(0.97); }
.product-card__cta:hover { background: var(--color-accent-dark); }

.product-card__cta.is-added {
  background: var(--color-black);
}

.onboarding {
  display: none;
  position: absolute;
  inset: 0;
  z-index: 100;
  background: var(--color-black);
  color: var(--color-white);
  flex-direction: column;
  justify-content: center;
  padding: 32px 28px;
  opacity: 1;
  transition: opacity 0.4s ease;
}

html.needs-onboarding .onboarding { display: flex; }

.onboarding--closing { opacity: 0; pointer-events: none; }

.onboarding__mark {
  font-family: var(--font-display);
  font-size: 13px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--color-accent);
  font-weight: 600;
  margin-bottom: 40px;
}

.onboarding__question {
  font-family: var(--font-display);
  font-size: 30px;
  font-weight: 700;
  line-height: 1.2;
  margin: 0 0 34px;
}

.onboarding__options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.onboarding__option {
  width: 100%;
  text-align: left;
  padding: 17px 20px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(255, 255, 255, 0.16);
  background: rgba(255, 255, 255, 0.04);
  color: var(--color-white);
  font-family: var(--font-body);
  font-size: 15.5px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background 0.15s ease, border-color 0.15s ease;
}

.onboarding__option:hover {
  background: rgba(255, 255, 255, 0.09);
  border-color: var(--color-accent);
}

.onboarding__option span.arrow {
  color: var(--color-accent);
  font-size: 17px;
}

:focus-visible {
  outline: 2px solid var(--color-accent);
  outline-offset: 2px;
}

.cart-backdrop {
  position: absolute;
  inset: 0;
  z-index: 80;
  background: rgba(17, 17, 17, 0.45);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.cart-backdrop.is-open {
  opacity: 1;
  pointer-events: auto;
}

.cart-drawer {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 90;
  max-height: 78%;
  display: flex;
  flex-direction: column;
  background: var(--color-white);
  border-top-left-radius: var(--radius-lg);
  border-top-right-radius: var(--radius-lg);
  box-shadow: var(--shadow-soft);
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
}

.cart-drawer.is-open { transform: translateY(0); }

.cart-drawer__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px 12px;
  border-bottom: 1px solid var(--color-grey-mid);
}

.cart-drawer__title {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 700;
  margin: 0;
}

.cart-drawer__close {
  border: none;
  background: var(--color-grey-light);
  width: 30px;
  height: 30px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  color: var(--color-black);
}

.cart-drawer__list {
  overflow-y: auto;
  padding: 8px 20px;
}

.cart-line {
  display: flex;
  gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid var(--color-grey-light);
}

.cart-line__image {
  width: 56px;
  height: 56px;
  border-radius: var(--radius-sm);
  object-fit: cover;
  background: var(--color-grey-light);
  flex-shrink: 0;
}

.cart-line__info { flex-grow: 1; min-width: 0; }

.cart-line__title {
  font-size: 13px;
  font-weight: 600;
  margin: 0 0 4px;
}

.cart-line__price {
  font-size: 12.5px;
  color: var(--color-grey-text);
  margin: 0 0 8px;
}

.cart-line__row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.cart-line__stepper {
  display: flex;
  align-items: center;
  border: 1px solid var(--color-grey-mid);
  border-radius: var(--radius-sm);
  overflow: hidden;
}

.cart-line__stepper button {
  border: none;
  background: var(--color-grey-light);
  width: 26px;
  height: 26px;
  font-size: 14px;
  cursor: pointer;
}

.cart-line__stepper span {
  width: 26px;
  text-align: center;
  font-size: 12.5px;
  font-weight: 600;
}

.cart-line__pay {
  border: none;
  background: var(--color-black);
  color: var(--color-white);
  font-size: 11.5px;
  font-weight: 600;
  padding: 7px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  text-decoration: none;
}

.cart-line__pay[aria-disabled="true"] {
  background: var(--color-grey-mid);
  color: var(--color-grey-text);
  cursor: not-allowed;
}

.cart-drawer__footer {
  padding: 14px 20px 20px;
  border-top: 1px solid var(--color-grey-mid);
}

.cart-drawer__total {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 15px;
  margin: 0 0 8px;
}

.cart-drawer__note {
  font-size: 11.5px;
  color: var(--color-grey-text);
  line-height: 1.4;
  margin: 0;
}

.cart-empty {
  padding: 30px 0;
  text-align: center;
  color: var(--color-grey-text);
  font-size: 13.5px;
}

@media (prefers-reduced-motion: reduce) {
  .onboarding,
  .cart-drawer,
  .cart-backdrop,
  .product-card__cta {
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

        <circle cx="256" cy="161" r="95" fill="#c98a3e"/>
        <circle cx="352" cy="221" r="95" fill="#c98a3e"/>
        <circle cx="316" cy="329" r="95" fill="#c98a3e"/>
        <circle cx="196" cy="329" r="95" fill="#c98a3e"/>
        <circle cx="160" cy="221" r="95" fill="#c98a3e"/>
        <circle cx="256" cy="256" r="59" fill="#111111"/>

    </p>
    <h2 class="onboarding__question" id="onboardingQuestion">Votre localisation ?</h2>
    <div class="onboarding__options">
      <button class="onboarding__option" data-region="La Réunion">La Réunion <span class="arrow" aria-hidden="true">→</span></button>

        <circle cx="352" cy="221" r="95" fill="#c98a3e"/>
        <circle cx="316" cy="329" r="95" fill="#c98a3e"/>
        <circle cx="196" cy="329" r="95" fill="#c98a3e"/>
        <circle cx="160" cy="221" r="95" fill="#c98a3e"/>

        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
        <path d="M3 6h18"></path>

      <p class="cart-drawer__total"><span>Total estimé</span><span id="cartTotal">0,00 €</span></p>
      <p class="cart-drawer__note">Chaque article se règle individuellement via son propre lien de paiement sécurisé (site 100% statique, sans serveur de commande centralisé).</p>

  <div class="sr-only" id="cartAnnouncer" aria-live="polite"></div>

  <main class="shop">

      <p class="eyebrow">Zoli Bazar</p>

    </section>

    <h2 class="section-title">Nos essentiels</h2>
    <div class="product-grid" id="productGrid"></div>
  </main>

</div>

<script>
var REGION_KEY = 'zoli_bazar_region';
var CART_KEY = 'zoli_bazar_cart';

var memoryFallback = {};
var storage = {
  get: function (key) {
    try {
      return localStorage.getItem(key);
    } catch (e) {
      return memoryFallback[key] || null;
    }
  },
  set: function (key, value) {
    try {
      localStorage.setItem(key, value);
    } catch (e) {
      memoryFallback[key] = value;
    }
  }
};

// Colle ici le lien de checkout Lemon Squeezy de chaque produit (champ checkoutUrl)
var products = [
  {
    id: 1,
    title: 'Chemise Lin Sauvage',
    priceEUR: 39.90,
    desc: 'Lin léger couleur sable, coupe ample pour les journées chaudes.',
    image: '/images/products/chemise.png',
    checkoutUrl: ''
  },
  {
    id: 2,
    title: 'Sac Raphia Tressé',
    priceEUR: 54.00,
    desc: 'Tressage artisanal en raphia naturel, doublure coton.',
    image: '/images/products/sac.png',
    checkoutUrl: ''
  },
  {
    id: 3,
    title: 'Sandales Cuir Vanille',
    priceEUR: 45.50,
    desc: 'Cuir souple teinté à la vanille, semelle confort.',
    image: '/images/products/sandales.png',
    checkoutUrl: ''
  },
  {
    id: 4,
    title: 'Foulard Soie Ylang-Ylang',
    priceEUR: 32.00,
    desc: 'Imprimé floral inspiré des jardins d\'ylang-ylang.',
    image: '/images/products/foulard.png',
    checkoutUrl: ''
  },
  {
    id: 5,
    title: 'Bracelet Ambre Baobab',
    priceEUR: 28.00,
    desc: 'Perles d\'ambre et bois de baobab sculpté à la main.',
    image: '/images/products/bracelet.png',
    checkoutUrl: ''
  },
  {
    id: 6,
    title: 'Chapeau Paille Salaka',
    priceEUR: 24.90,
    desc: 'Paille tressée fine, forme traditionnelle revisitée.',
    image: '/images/products/chapeau.png',
    checkoutUrl: ''
  }
];

var cultureContent = {
  'Mayotte': {
    title: 'Duka Yatru',
    subtitle: 'Karibu mu duka langu — L\'essentiel chez vous.'
  },
  'La Réunion': {
    title: 'Bienvenue chez vous !',
    subtitle: 'Boutik la kour — Livré parout ousa ou lé.'
  },
  'Madagascar': {
    title: 'Tongasoa !',
    subtitle: 'Bazar antsika — Ny tsara indrindra ho anao.'
  }
};

function formatPrice(priceEUR, region) {
  if (region === 'Madagascar') {
    var ariary = Math.round((priceEUR * 4900) / 10) * 10;
    return ariary.toLocaleString('fr-FR') + ' Ar';
  }
  return priceEUR.toFixed(2).replace('.', ',') + ' €';
}

function renderProducts(region) {
  var grid = document.getElementById('productGrid');
  var html = '';
  for (var i = 0; i < products.length; i++) {
    var p = products[i];
    html +=
      '<article class="product-card">' +
        '<img class="product-card__image" src="' + p.image + '" alt="' + p.title + '" loading="lazy">' +
        '<div class="product-card__body">' +
          '<p class="product-card__title">' + p.title + '</p>' +
          '<p class="product-card__desc">' + p.desc + '</p>' +
          '<p class="product-card__price">' + formatPrice(p.priceEUR, region) + '</p>' +
          '<button class="product-card__cta" data-product-id="' + p.id + '">Ajouter</button>' +
        '</div>' +
      '</article>';
  }
  grid.innerHTML = html;

  var buttons = grid.querySelectorAll('.product-card__cta');
  buttons.forEach(function (btn) {
    btn.addEventListener('click', handleAddToCart);
  });
}

function handleAddToCart(event) {
  var btn = event.currentTarget;
  var id = Number(btn.getAttribute('data-product-id'));
  var originalLabel = btn.textContent;

  addToCart(id);

  btn.textContent = 'Ajouté ✓';
  btn.classList.add('is-added');
  setTimeout(function () {
    btn.textContent = originalLabel;
    btn.classList.remove('is-added');
  }, 1400);
}

function loadCart() {
  var raw = storage.get(CART_KEY);
  if (!raw) return {};
  try {
    return JSON.parse(raw);
  } catch (e) {
    return {};
  }
}

var cart = loadCart();

function saveCart() {
  storage.set(CART_KEY, JSON.stringify(cart));
}

function announce(message) {
  var el = document.getElementById('cartAnnouncer');
  if (el) el.textContent = message;
}

function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  saveCart();
  updateCartBadge();
  renderCartDrawer(currentRegion);
  var product = products.filter(function (p) { return p.id === id; })[0];
  if (product) announce(product.title + ' ajouté au panier.');
}

function changeQty(id, delta) {
  cart[id] = (cart[id] || 0) + delta;
  if (cart[id] <= 0) delete cart[id];
  saveCart();
  updateCartBadge();
  renderCartDrawer(currentRegion);
}

function removeFromCart(id) {
  delete cart[id];
  saveCart();
  updateCartBadge();
  renderCartDrawer(currentRegion);
}

function cartCount() {
  var count = 0;
  for (var key in cart) count += cart[key];
  return count;
}

function updateCartBadge() {
  var badge = document.getElementById('cartBadge');
  var count = cartCount();
  badge.textContent = count;
  badge.classList.toggle('is-visible', count > 0);
}

function renderCartDrawer(region) {
  var list = document.getElementById('cartList');
  var ids = Object.keys(cart);

  if (ids.length === 0) {
    list.innerHTML = '<p class="cart-empty">Votre panier est vide pour le moment.</p>';
    document.getElementById('cartTotal').textContent = formatPrice(0, region);
    return;
  }

  var total = 0;
  var html = '';

  ids.forEach(function (idStr) {
    var id = Number(idStr);
    var qty = cart[id];
    var product = products.filter(function (p) { return p.id === id; })[0];
    if (!product) return;

    var lineTotal = product.priceEUR * qty;
    total += lineTotal;

    var payAttrs = product.checkoutUrl
      ? 'href="' + product.checkoutUrl + '" target="_blank" rel="noopener"'
      : 'href="#" aria-disabled="true" title="Lien de paiement à configurer"';

    html +=
      '<div class="cart-line">' +
        '<img class="cart-line__image" src="' + product.image + '" alt="" loading="lazy">' +
        '<div class="cart-line__info">' +
          '<p class="cart-line__title">' + product.title + '</p>' +
          '<p class="cart-line__price">' + formatPrice(lineTotal, region) + '</p>' +
          '<div class="cart-line__row">' +
            '<div class="cart-line__stepper">' +
              '<button type="button" data-action="decrease" data-id="' + id + '" aria-label="Retirer un ' + product.title + '">−</button>' +
              '<span>' + qty + '</span>' +
              '<button type="button" data-action="increase" data-id="' + id + '" aria-label="Ajouter un ' + product.title + '">+</button>' +
            '</div>' +
            '<a class="cart-line__pay" ' + payAttrs + '>Payer</a>' +
          '</div>' +
        '</div>' +
      '</div>';
  });

  list.innerHTML = html;
  document.getElementById('cartTotal').textContent = formatPrice(total, region);

  list.querySelectorAll('[data-action="increase"]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      changeQty(Number(btn.getAttribute('data-id')), 1);
    });
  });
  list.querySelectorAll('[data-action="decrease"]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      changeQty(Number(btn.getAttribute('data-id')), -1);
    });
  });
  list.querySelectorAll('.cart-line__pay[aria-disabled="true"]').forEach(function (link) {
    link.addEventListener('click', function (event) {
      event.preventDefault();
    });
  });
}

var lastFocusedElement = null;

function openCart() {
  lastFocusedElement = document.activeElement;
  document.getElementById('cartBackdrop').classList.add('is-open');
  document.getElementById('cartDrawer').classList.add('is-open');
  document.getElementById('cartClose').focus();
}

function closeCart() {
  document.getElementById('cartBackdrop').classList.remove('is-open');
  document.getElementById('cartDrawer').classList.remove('is-open');
  if (lastFocusedElement) lastFocusedElement.focus();
}

var currentRegion = 'La Réunion';

function applyCultureBanner(region) {
  var content = cultureContent[region];
  if (!content) return;
  document.getElementById('bannerTitle').textContent = content.title;
  document.getElementById('bannerSubtitle').textContent = content.subtitle;
}

function hideOnboarding() {
  var onboarding = document.getElementById('onboarding');
  onboarding.classList.add('onboarding--closing');
  setTimeout(function () {
    onboarding.style.display = 'none';
    document.documentElement.classList.remove('needs-onboarding');
  }, 400);
}

function selectRegion(region) {
  currentRegion = region;
  storage.set(REGION_KEY, region);
  applyCultureBanner(region);
  renderProducts(region);
  renderCartDrawer(region);
  hideOnboarding();
}

document.addEventListener('DOMContentLoaded', function () {
  var savedRegion = storage.get(REGION_KEY);

  if (savedRegion) {
    currentRegion = savedRegion;
    applyCultureBanner(savedRegion);
    renderProducts(savedRegion);
  } else {
    renderProducts(currentRegion);
    var firstOption = document.querySelector('.onboarding__option');
    if (firstOption) firstOption.focus();
  }

  updateCartBadge();
  renderCartDrawer(currentRegion);

  var optionButtons = document.querySelectorAll('.onboarding__option');
  optionButtons.forEach(function (btn) {
    btn.addEventListener('click', function () {
      selectRegion(btn.getAttribute('data-region'));
    });
  });

  document.getElementById('cartButton').addEventListener('click', openCart);
  document.getElementById('cartClose').addEventListener('click', closeCart);
  document.getElementById('cartBackdrop').addEventListener('click', closeCart);

  document.addEventListener('keydown', function (event) {
    if (event.key === 'Escape' && document.getElementById('cartDrawer').classList.contains('is-open')) {
      closeCart();
    }
  });
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('/sw.js').catch(function () {});
  });
}
</script>
</body>
</html>
