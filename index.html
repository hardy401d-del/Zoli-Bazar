<script>
(function () {
  try {
    var region = localStorage.getItem('zoli_bazar_region');
    if (!region) {
      document.documentElement.classList.add('needs-onboarding');
    }
  } catch (e) {
    document.documentElement.classList.add('needs-onboarding');
  }
})();

<style>
:root {
  --color-black: #111111;
  --color-white: #ffffff;
  --color-grey-light: #f5f5f4;
  --color-grey-mid: #e4e3e0;
  --color-grey-text: #706e6a;
  --color-accent: #c98a3e;
  --color-accent-dark: #a8702e;
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
  --radius-lg: 22px;
  --radius-md: 16px;
  --radius-sm: 10px;
  --shadow-soft: 0 24px 60px -24px rgba(17, 17, 17, 0.35);
  --header-height: 64px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: var(--color-grey-mid);
  font-family: var(--font-body);
  color: var(--color-black);
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

.app-frame {
  position: relative;
  width: 100%;
  max-width: 450px;
  min-height: 100vh;
  height: 100vh;
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--color-white);
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.app-frame::-webkit-scrollbar { display: none; }

@media (min-width: 451px) {
  body { align-items: center; padding: 32px 0; }
  .app-frame {
    height: 90vh;
    min-height: 640px;
    max-height: 900px;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-soft);
  }
}

header.app-header {
  position: sticky;
  top: 0;
  z-index: 20;
  height: var(--header-height);
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: saturate(180%) blur(14px);
  -webkit-backdrop-filter: saturate(180%) blur(14px);
  border-bottom: 1px solid var(--color-grey-mid);
}

.app-header__inner {
  max-width: var(--content-max, 1160px);
  margin: 0 auto;
  height: 100%;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

header.app-header .logo {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 19px;
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  gap: 8px;
}

header.app-header .logo__mark { flex-shrink: 0; }

.cart-button {
  position: relative;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: none;
  background: var(--color-grey-light);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
}

.cart-button svg { width: 18px; height: 18px; }

.cart-badge {
  position: absolute;
  top: -4px;
  right: -4px;

  height: 18px;
  padding: 0 4px;
  border-radius: 9px;

  color: var(--color-white);

  justify-content: center;
  line-height: 1;
}

.cart-badge.is-visible { display: flex; }

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

main.shop { padding: 20px 20px 48px; }

.shop__inner {
  max-width: var(--content-max, 1160px);
  margin: 0 auto;
}

.culture-banner {
  background: var(--color-black);
  color: var(--color-white);
  border-radius: var(--radius-md);
  padding: 26px 24px;

}

.culture-banner__text { min-width: 0; }

.culture-banner__graphic {

}

.culture-banner .eyebrow {

  margin: 0 0 8px;
}

.culture-banner h1 {

.culture-banner p.subtitle {

  line-height: 1.5;

.toolbar {

}

.search-box { position: relative; }

.search-box svg {

.search-box input {

.chip-row {

  padding-bottom: 2px;
  scrollbar-width: none;
}

.chip-row::-webkit-scrollbar { display: none; }

.chip {

  background: var(--color-white);
  color: var(--color-grey-text);
  font-family: var(--font-body);
  font-size: 12.5px;
  font-weight: 600;
  padding: 8px 14px;
  border-radius: 999px;

}

.chip.is-active {

  border-color: var(--color-black);
  color: var(--color-white);
}

.section-title {

  font-size: 15px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--color-grey-text);
  margin: 0 0 16px;
}

.empty-state {
  padding: 40px 10px;
  text-align: center;
  color: var(--color-grey-text);
  font-size: 13.5px;
  grid-column: 1 / -1;
}

.region-switch {
  margin-top: 32px;
  padding-top: 20px;
  border-top: 1px solid var(--color-grey-mid);
  text-align: center;
}

.region-switch__btn {
  border: none;
  background: none;
  color: var(--color-grey-text);
  font-family: var(--font-body);
  font-size: 12.5px;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
  padding: 8px;
}

.region-switch__btn:hover { color: var(--color-black); }

.product-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.product-card {
  display: flex;
  flex-direction: column;
  border-radius: var(--radius-md);
  overflow: hidden;
  background: var(--color-white);
  border: 1px solid var(--color-grey-mid);
}

.product-card__media { position: relative; }

.product-card__imgbtn {
  display: block;
  width: 100%;
  border: none;
  padding: 0;
  margin: 0;
  background: none;
  cursor: pointer;
}

.product-card__image {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  background: var(--color-grey-light);
  display: block;
}

.badge {
  position: absolute;
  left: 8px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 4px 8px;
  border-radius: 999px;
  color: var(--color-white);
  z-index: 2;
}

.badge--new { top: 8px; background: var(--color-accent); }
.badge--trend { top: 34px; background: var(--color-black); }
.badge--trend.badge--only { top: 8px; }

.product-card__fav {
  position: absolute;
  top: 8px;
  right: 8px;
  z-index: 2;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: none;
  background: rgba(255, 255, 255, 0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 15px;
  color: var(--color-black);
}

.product-card__fav[aria-pressed="true"] { color: var(--color-accent); }

.product-card__body {
  padding: 12px 12px 14px;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
}

.product-card__title {
  font-size: 13.5px;
  font-weight: 600;
  margin: 0 0 4px;
  line-height: 1.3;
}

.product-card__desc {
  font-size: 12px;
  color: var(--color-grey-text);
  line-height: 1.4;
  margin: 0 0 10px;
  flex-grow: 1;
}

.product-card__price {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 14.5px;
  margin: 0 0 10px;
}

.product-card__cta {
  border: none;
  background: var(--color-accent);
  color: var(--color-white);
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 12.5px;
  padding: 10px 0;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.15s ease, transform 0.1s ease;
}

.product-card__cta:active { transform: scale(0.97); }
.product-card__cta:hover { background: var(--color-accent-dark); }
.product-card__cta.is-added { background: var(--color-black); }

.onboarding {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: var(--color-black);
  color: var(--color-white);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 28px 24px;
  opacity: 1;
  transition: opacity 0.4s ease;
}

.onboarding__inner {
  width: 100%;
  max-width: 420px;
  max-height: 100%;
  overflow-y: auto;
}

html.needs-onboarding .onboarding { display: flex; }

.onboarding--closing { opacity: 0; pointer-events: none; }

.onboarding__mark {
  font-family: var(--font-display);
  font-size: 13px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--color-accent);
  font-weight: 600;
  margin-bottom: 28px;
}

.onboarding__question {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 700;
  line-height: 1.2;
  margin: 0 0 24px;
}

.onboarding__options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.onboarding__option {
  width: 100%;
  text-align: left;
  padding: 14px 18px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(255, 255, 255, 0.16);
  background: rgba(255, 255, 255, 0.04);
  color: var(--color-white);
  font-family: var(--font-body);
  font-size: 14.5px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background 0.15s ease, border-color 0.15s ease;
}

.onboarding__option:hover {
  background: rgba(255, 255, 255, 0.09);
  border-color: var(--color-accent);
}

.onboarding__option span.arrow { color: var(--color-accent); font-size: 17px; }

:focus-visible {
  outline: 2px solid var(--color-accent);
  outline-offset: 2px;
}

.cart-backdrop {
  position: fixed;
  inset: 0;
  z-index: 80;
  background: rgba(17, 17, 17, 0.45);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.cart-backdrop.is-open { opacity: 1; pointer-events: auto; }

.cart-drawer {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 90;
  max-height: 78%;
  display: flex;
  flex-direction: column;
  background: var(--color-white);
  border-top-left-radius: var(--radius-lg);
  border-top-right-radius: var(--radius-lg);
  box-shadow: var(--shadow-soft);
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
}

.cart-drawer.is-open { transform: translateY(0); }

.cart-drawer__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px 12px;
  border-bottom: 1px solid var(--color-grey-mid);
}

.cart-drawer__title { font-family: var(--font-display); font-size: 17px; font-weight: 700; margin: 0; }

.cart-drawer__close {
  border: none;
  background: var(--color-grey-light);
  width: 30px;
  height: 30px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  color: var(--color-black);
}

.cart-drawer__list { overflow-y: auto; padding: 8px 20px; }

.cart-line { display: flex; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--color-grey-light); }

.cart-line__image {
  width: 56px; height: 56px; border-radius: var(--radius-sm);
  object-fit: cover; background: var(--color-grey-light); flex-shrink: 0;
}

.cart-line__info { flex-grow: 1; min-width: 0; }
.cart-line__title { font-size: 13px; font-weight: 600; margin: 0 0 4px; }
.cart-line__price { font-size: 12.5px; color: var(--color-grey-text); margin: 0 0 8px; }
.cart-line__row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }

.cart-line__stepper {
  display: flex; align-items: center; border: 1px solid var(--color-grey-mid);
  border-radius: var(--radius-sm); overflow: hidden;
}

.cart-line__stepper button { border: none; background: var(--color-grey-light); width: 26px; height: 26px; font-size: 14px; cursor: pointer; }
.cart-line__stepper span { width: 26px; text-align: center; font-size: 12.5px; font-weight: 600; }

.cart-line__pay {
  border: none; background: var(--color-black); color: var(--color-white);
  font-size: 11.5px; font-weight: 600; padding: 7px 12px; border-radius: var(--radius-sm);
  cursor: pointer; text-decoration: none;
}

.cart-line__pay[aria-disabled="true"] { background: var(--color-grey-mid); color: var(--color-grey-text); cursor: not-allowed; }

.cart-drawer__footer { padding: 14px 20px 20px; border-top: 1px solid var(--color-grey-mid); }
.cart-drawer__total { display: flex; justify-content: space-between; font-family: var(--font-display); font-weight: 700; font-size: 15px; margin: 0 0 8px; }
.cart-drawer__note { font-size: 11.5px; color: var(--color-grey-text); line-height: 1.4; margin: 0; }
.cart-empty { padding: 30px 0; text-align: center; color: var(--color-grey-text); font-size: 13.5px; }

.detail-sheet {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 95;
  max-height: 88%;
  overflow-y: auto;
  background: var(--color-white);
  border-top-left-radius: var(--radius-lg);
  border-top-right-radius: var(--radius-lg);
  box-shadow: var(--shadow-soft);
  transform: translateY(100%);
  opacity: 1;
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.3s ease;
}

.detail-sheet.is-open { transform: translateY(0); }

.detail-sheet__media { position: relative; }

.detail-sheet__image {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  background: var(--color-grey-light);
  display: block;
}

.detail-sheet__close {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  background: rgba(17, 17, 17, 0.55);
  color: var(--color-white);
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.detail-sheet__body { padding: 20px 22px 22px; }
.detail-sheet__badges { display: flex; gap: 6px; margin-bottom: 10px; }

.detail-sheet__badge {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
  padding: 4px 9px; border-radius: 999px; color: var(--color-white);
}

.detail-sheet__badge--new { background: var(--color-accent); }
.detail-sheet__badge--trend { background: var(--color-black); }

.detail-sheet__title { font-family: var(--font-display); font-size: 21px; font-weight: 700; margin: 0 0 8px; }
.detail-sheet__price { font-family: var(--font-display); font-weight: 700; font-size: 17px; margin: 0 0 14px; }
.detail-sheet__desc { font-size: 13.5px; line-height: 1.6; color: var(--color-grey-text); margin: 0 0 22px; }

.detail-sheet__fav {
  width: 46px; height: 46px; flex-shrink: 0; border-radius: var(--radius-sm);
  border: 1px solid var(--color-grey-mid); background: var(--color-white);

}

.detail-sheet__fav[aria-pressed="true"] { color: var(--color-accent); border-color: var(--color-accent); }

.detail-sheet__cta {
  flex-grow: 1; border: none; background: var(--color-accent); color: var(--color-white);
  font-family: var(--font-body); font-weight: 700; font-size: 14px; border-radius: var(--radius-sm);
  cursor: pointer;
}

.detail-sheet__cta:hover { background: var(--color-accent-dark); }

@media (prefers-reduced-motion: reduce) {
  .onboarding, .cart-drawer, .cart-backdrop, .detail-sheet, .product-card__cta {
    transition-duration: 0.01ms !important;
  }
}

@media (min-width: 900px) {
  body { align-items: stretch; padding: 0; }

  .app-frame {
    max-width: none;
    width: 100%;
    height: auto;
    min-height: 100vh;
    border-radius: 0;
    box-shadow: none;
    overflow: visible;
  }

  .app-header__inner { padding: 0 40px; }
  main.shop { padding: 40px 40px 72px; }
  .culture-banner { padding: 48px 56px; }
  .culture-banner h1 { font-size: 34px; }
  .culture-banner__graphic { display: flex; }

  .toolbar { flex-direction: row; align-items: center; justify-content: space-between; gap: 16px; }
  .search-box { max-width: 280px; flex-shrink: 0; }

  .product-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }

  .cart-drawer {

  .detail-sheet {
    left: 50%; right: auto; bottom: auto; top: 50%;

    border-radius: var(--radius-lg);
    transform: translate(-50%, calc(-50% + 16px));
    opacity: 0;
    pointer-events: none;
  }
  .detail-sheet.is-open { transform: translate(-50%, -50%); opacity: 1; pointer-events: auto; }
}

    </div>
  </div>

  <header class="app-header">
    <div class="app-header__inner">
      <span class="logo">
        <svg class="logo__mark" width="22" height="22" viewBox="0 0 512 512" aria-hidden="true">
          <circle cx="256" cy="161" r="95" fill="#c98a3e"/>
          <circle cx="352" cy="221" r="95" fill="#c98a3e"/>
          <circle cx="316" cy="329" r="95" fill="#c98a3e"/>
          <circle cx="196" cy="329" r="95" fill="#c98a3e"/>
          <circle cx="160" cy="221" r="95" fill="#c98a3e"/>
          <circle cx="256" cy="256" r="59" fill="#111111"/>
        </svg>
        Zoli Bazar
      </span>
      <button class="cart-button" id="cartButton" aria-haspopup="dialog" aria-controls="cartDrawer" aria-label="Ouvrir le panier">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
          <path d="M3 6h18"></path>
          <path d="M16 10a4 4 0 0 1-8 0"></path>
        </svg>
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
    </div>
  </header>

  <div class="cart-backdrop" id="cartBackdrop"></div>
  <div class="cart-backdrop" id="detailBackdrop"></div>

  <div class="cart-drawer" id="cartDrawer" role="dialog" aria-modal="true" aria-labelledby="cartDrawerTitle">
    <div class="cart-drawer__header">
      <h2 class="cart-drawer__title" id="cartDrawerTitle">Votre panier</h2>
      <button class="cart-drawer__close" id="cartClose" aria-label="Fermer le panier">✕</button>
    </div>
    <div class="cart-drawer__list" id="cartList"></div>
    <div class="cart-drawer__footer">
      <p class="cart-drawer__total"><span>Total estimé</span><span id="cartTotal">0,00 €</span></p>
      <p class="cart-drawer__note">Chaque article se règle individuellement via son propre lien de paiement sécurisé (site 100% statique, sans serveur de commande centralisé).</p>
    </div>
  </div>

  <div class="detail-sheet" id="detailSheet" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
    <div class="detail-sheet__media">
      <img class="detail-sheet__image" id="detailImage" src="" alt="">
      <button class="detail-sheet__close" id="detailClose" aria-label="Fermer">✕</button>
    </div>
    <div class="detail-sheet__body">
      <div class="detail-sheet__badges" id="detailBadges"></div>
      <h2 class="detail-sheet__title" id="detailTitle"></h2>
      <p class="detail-sheet__price" id="detailPrice"></p>
      <p class="detail-sheet__desc" id="detailDesc"></p>
      <div class="detail-sheet__actions">
        <button class="detail-sheet__fav" id="detailFav" aria-label="Ajouter aux favoris" aria-pressed="false">♡</button>
        <button class="detail-sheet__cta" id="detailAddBtn">Ajouter au panier</button>
      </div>
    </div>
  </div>

  <div class="sr-only" id="cartAnnouncer" aria-live="polite"></div>

  <main class="shop">
    <div class="shop__inner">
      <section class="culture-banner" id="cultureBanner">
        <div class="culture-banner__text">
          <p class="eyebrow">Zoli Bazar</p>
          <h1 id="bannerTitle">Bienvenue</h1>
          <p class="subtitle" id="bannerSubtitle">Votre boutique de l'Océan Indien.</p>
        </div>
        <div class="culture-banner__graphic" aria-hidden="true">
          <svg width="110" height="110" viewBox="0 0 512 512">
            <circle cx="256" cy="161" r="95" fill="#c98a3e"/>
            <circle cx="352" cy="221" r="95" fill="#c98a3e"/>
            <circle cx="316" cy="329" r="95" fill="#c98a3e"/>
            <circle cx="196" cy="329" r="95" fill="#c98a3e"/>
            <circle cx="160" cy="221" r="95" fill="#c98a3e"/>
            <circle cx="256" cy="256" r="59" fill="#111111"/>
          </svg>
        </div>
      </section>

      <div class="toolbar">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </svg>
          <input type="search" id="searchInput" placeholder="Rechercher un article...">
        </div>
        <div class="chip-row" id="chipRow">
          <button class="chip is-active" data-filter="all" aria-pressed="true">Tous</button>
          <button class="chip" data-filter="new" aria-pressed="false">Nouveautés</button>
          <button class="chip" data-filter="trending" aria-pressed="false">Tendances</button>
          <button class="chip" data-filter="favorites" aria-pressed="false">Mes favoris</button>
        </div>
      </div>

      <h2 class="section-title">Nos essentiels</h2>
      <div class="product-grid" id="productGrid"></div>

      <div class="region-switch">
        <button id="regionSwitchBtn" class="region-switch__btn">Changer de région (<span id="regionSwitchLabel"></span>)</button>
      </div>
    </div>
  </main>

</div>

<script>
var REGION_KEY = 'zoli_bazar_region';
var CART_KEY = 'zoli_bazar_cart';
var FAVORITES_KEY = 'zoli_bazar_favorites';

var memoryFallback = {};
var storage = {
  get: function (key) {
    try {
      return localStorage.getItem(key);
    } catch (e) {
      return memoryFallback[key] || null;
    }
  },
  set: function (key, value) {
    try {
      localStorage.setItem(key, value);
    } catch (e) {
      memoryFallback[key] = value;
    }
  }
};

// Colle ici le lien de checkout Lemon Squeezy de chaque produit (champ checkoutUrl)
var products = [
  {
    id: 1,
    title: 'Chemise Lin Sauvage',
    priceEUR: 39.90,
    desc: 'Lin léger couleur sable, coupe ample pour les journées chaudes.',
    longDesc: 'Taillée dans un lin léger couleur sable, cette chemise à coupe ample laisse circuler l\'air pendant les journées les plus chaudes. Col ouvert, manches courtes structurées, un basique polyvalent pour la ville comme pour la plage.',
    image: '/images/products/chemise.png',
    checkoutUrl: '',
    isNew: true,
    isTrending: false
  },
  {
    id: 2,
    title: 'Sac Raphia Tressé',
    priceEUR: 54.00,
    desc: 'Tressage artisanal en raphia naturel, doublure coton.',
    longDesc: 'Chaque sac est tressé à la main en raphia naturel par des artisans locaux, puis doublé de coton pour protéger vos affaires. Anses renforcées, fermeture à bouton, un format généreux pour le marché comme pour la plage.',
    image: '/images/products/sac.png',
    checkoutUrl: '',
    isNew: false,
    isTrending: true
  },
  {
    id: 3,
    title: 'Sandales Cuir Vanille',
    priceEUR: 45.50,
    desc: 'Cuir souple teinté à la vanille, semelle confort.',
    longDesc: 'Un cuir pleine fleur souple, teinté à la vanille pour une patine chaude et naturelle. La semelle à mémoire de forme accompagne la marche toute la journée, même sur sable chaud ou pavés.',
    image: '/images/products/sandales.png',
    checkoutUrl: '',
    isNew: true,
    isTrending: false
  },
  {
    id: 4,
    title: 'Foulard Soie Ylang-Ylang',
    priceEUR: 32.00,
    desc: 'Imprimé floral inspiré des jardins d\'ylang-ylang.',
    longDesc: 'Un carré de soie fluide à l\'imprimé exclusif, inspiré des jardins d\'ylang-ylang qui parfument l\'air aux alentours. Se porte en foulard, en headband ou noué à une anse de sac.',
    image: '/images/products/foulard.png',
    checkoutUrl: '',
    isNew: false,
    isTrending: true
  },
  {
    id: 5,
    title: 'Bracelet Ambre Baobab',
    priceEUR: 28.00,
    desc: 'Perles d\'ambre et bois de baobab sculpté à la main.',
    longDesc: 'Perles d\'ambre naturelles alternées avec des perles de bois de baobab, sculptées et polies à la main. Élastique ajustable, se porte seul ou empilé avec d\'autres bracelets.',
    image: '/images/products/bracelet.png',
    checkoutUrl: '',
    isNew: false,
    isTrending: false
  },
  {
    id: 6,
    title: 'Chapeau Paille Salaka',
    priceEUR: 24.90,
    desc: 'Paille tressée fine, forme traditionnelle revisitée.',
    longDesc: 'Inspiré du salaka traditionnel, ce chapeau en paille tressée fine protège du soleil sans jamais peser sur la tête. Bord légèrement relevé, forme intemporelle revisitée pour un usage quotidien.',
    image: '/images/products/chapeau.png',
    checkoutUrl: '',
    isNew: true,
    isTrending: true
  }
];

var regions = {
  'La Réunion': {
    title: 'Bienvenue chez vous !',
    subtitle: 'Boutik la kour — Livré parout ousa ou lé.',
    currency: { code: 'EUR', symbol: ' €' }
  },
  'Mayotte': {
    title: 'Duka Yatru',
    subtitle: 'Karibu mu duka langu — L\'essentiel chez vous.',
    currency: { code: 'EUR', symbol: ' €' }
  },
  'Madagascar': {
    title: 'Tongasoa !',
    subtitle: 'Bazar antsika — Ny tsara indrindra ho anao.',
    currency: { code: 'MGA', symbol: ' Ar', rate: 4900, roundTo: 10 }
  },
  'Comores': {
    title: 'Karibu Bazari',
    subtitle: 'Bazar yahu — livré partout aux Comores.',
    currency: { code: 'KMF', symbol: ' KMF', rate: 492, roundTo: 10 }
  },
  'Maurice': {
    title: 'Byenveni !',
    subtitle: 'Nou livre dan tou lil Moris — zot boutik lakaz.',
    currency: { code: 'MUR', symbol: ' Rs', rate: 48, roundTo: 1 }
  },
  'Seychelles': {
    title: 'Byenveni !',
    subtitle: 'Nou livre dan tou Sesel — zot boutik.',
    currency: { code: 'SCR', symbol: ' SCR', rate: 15, roundTo: 1 }
  }
};

function formatPrice(priceEUR, region) {
  var cfg = (regions[region] && regions[region].currency) || regions['La Réunion'].currency;
  if (cfg.code === 'EUR') {
    return priceEUR.toFixed(2).replace('.', ',') + cfg.symbol;
  }
  var raw = priceEUR * cfg.rate;
  var rounded = cfg.roundTo ? Math.round(raw / cfg.roundTo) * cfg.roundTo : Math.round(raw);
  return rounded.toLocaleString('fr-FR') + cfg.symbol;
}

function loadFavorites() {
  var raw = storage.get(FAVORITES_KEY);
  if (!raw) return [];
  try {
    return JSON.parse(raw);
  } catch (e) {
    return [];
  }
}

var favorites = loadFavorites();

function saveFavorites() {
  storage.set(FAVORITES_KEY, JSON.stringify(favorites));
}

function isFavorite(id) {
  return favorites.indexOf(id) !== -1;
}

function toggleFavorite(id) {
  var index = favorites.indexOf(id);
  if (index === -1) {
    favorites.push(id);
  } else {
    favorites.splice(index, 1);
  }
  saveFavorites();
}

var currentFilter = 'all';
var searchTerm = '';

function getFilteredProducts() {
  return products.filter(function (p) {
    if (currentFilter === 'new' && !p.isNew) return false;
    if (currentFilter === 'trending' && !p.isTrending) return false;
    if (currentFilter === 'favorites' && !isFavorite(p.id)) return false;
    if (searchTerm) {
      var haystack = (p.title + ' ' + p.desc).toLowerCase();
      if (haystack.indexOf(searchTerm.toLowerCase()) === -1) return false;
    }
    return true;
  });
}

function renderProducts(region) {
  var grid = document.getElementById('productGrid');
  var list = getFilteredProducts();

  if (list.length === 0) {
    grid.innerHTML = '<p class="empty-state">Aucun article ne correspond à ta recherche.</p>';
    return;
  }

  var html = '';
  for (var i = 0; i < list.length; i++) {
    var p = list[i];
    var fav = isFavorite(p.id);
    var badgesHtml = '';
    if (p.isNew) badgesHtml += '<span class="badge badge--new">Nouveau</span>';
    if (p.isTrending) badgesHtml += '<span class="badge badge--trend' + (p.isNew ? '' : ' badge--only') + '">Tendance</span>';

    html +=
      '<article class="product-card">' +
        '<div class="product-card__media">' +
          badgesHtml +
          '<button class="product-card__fav" data-id="' + p.id + '" aria-pressed="' + fav + '" aria-label="' + (fav ? 'Retirer des favoris' : 'Ajouter aux favoris') + '">' + (fav ? '♥' : '♡') + '</button>' +
          '<button class="product-card__imgbtn" data-id="' + p.id + '" aria-label="Voir ' + p.title + '">' +
            '<img class="product-card__image" src="' + p.image + '" alt="" loading="lazy">' +
          '</button>' +
        '</div>' +
        '<div class="product-card__body">' +
          '<p class="product-card__title">' + p.title + '</p>' +
          '<p class="product-card__desc">' + p.desc + '</p>' +
          '<p class="product-card__price">' + formatPrice(p.priceEUR, region) + '</p>' +
          '<button class="product-card__cta" data-product-id="' + p.id + '">Ajouter</button>' +
        '</div>' +
      '</article>';
  }
  grid.innerHTML = html;

  grid.querySelectorAll('.product-card__cta').forEach(function (btn) {
    btn.addEventListener('click', handleAddToCart);
  });
  grid.querySelectorAll('.product-card__imgbtn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      openDetail(Number(btn.getAttribute('data-id')));
    });
  });
  grid.querySelectorAll('.product-card__fav').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var id = Number(btn.getAttribute('data-id'));
      toggleFavorite(id);
      renderProducts(currentRegion);
    });
  });
}

function handleAddToCart(event) {
  var btn = event.currentTarget;
  var id = Number(btn.getAttribute('data-product-id'));
  var originalLabel = btn.textContent;

  addToCart(id);

  btn.textContent = 'Ajouté ✓';
  btn.classList.add('is-added');
  setTimeout(function () {
    btn.textContent = originalLabel;
    btn.classList.remove('is-added');
  }, 1400);
}

function loadCart() {
  var raw = storage.get(CART_KEY);
  if (!raw) return {};
  try {
    return JSON.parse(raw);
  } catch (e) {
    return {};
  }
}

var cart = loadCart();

function saveCart() {
  storage.set(CART_KEY, JSON.stringify(cart));
}

function announce(message) {
  var el = document.getElementById('cartAnnouncer');
  if (el) el.textContent = message;
}

function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  saveCart();
  updateCartBadge();
  renderCartDrawer(currentRegion);
  var product = products.filter(function (p) { return p.id === id; })[0];
  if (product) announce(product.title + ' ajouté au panier.');
}

function changeQty(id, delta) {
  cart[id] = (cart[id] || 0) + delta;
  if (cart[id] <= 0) delete cart[id];
  saveCart();
  updateCartBadge();
  renderCartDrawer(currentRegion);
}

function cartCount() {
  var count = 0;
  for (var key in cart) count += cart[key];
  return count;
}

function updateCartBadge() {
  var badge = document.getElementById('cartBadge');
  var count = cartCount();
  badge.textContent = count;
  badge.classList.toggle('is-visible', count > 0);
}

function renderCartDrawer(region) {
  var list = document.getElementById('cartList');
  var ids = Object.keys(cart);

  if (ids.length === 0) {
    list.innerHTML = '<p class="cart-empty">Votre panier est vide pour le moment.</p>';
    document.getElementById('cartTotal').textContent = formatPrice(0, region);
    return;
  }

  var total = 0;
  var html = '';

  ids.forEach(function (idStr) {
    var id = Number(idStr);
    var qty = cart[id];
    var product = products.filter(function (p) { return p.id === id; })[0];
    if (!product) return;

    var lineTotal = product.priceEUR * qty;
    total += lineTotal;

    var payAttrs = product.checkoutUrl
      ? 'href="' + product.checkoutUrl + '" target="_blank" rel="noopener"'
      : 'href="#" aria-disabled="true" title="Lien de paiement à configurer"';

    html +=
      '<div class="cart-line">' +
        '<img class="cart-line__image" src="' + product.image + '" alt="" loading="lazy">' +
        '<div class="cart-line__info">' +
          '<p class="cart-line__title">' + product.title + '</p>' +
          '<p class="cart-line__price">' + formatPrice(lineTotal, region) + '</p>' +
          '<div class="cart-line__row">' +
            '<div class="cart-line__stepper">' +
              '<button type="button" data-action="decrease" data-id="' + id + '" aria-label="Retirer un ' + product.title + '">−</button>' +
              '<span>' + qty + '</span>' +
              '<button type="button" data-action="increase" data-id="' + id + '" aria-label="Ajouter un ' + product.title + '">+</button>' +
            '</div>' +
            '<a class="cart-line__pay" ' + payAttrs + '>Payer</a>' +
          '</div>' +
        '</div>' +
      '</div>';
  });

  list.innerHTML = html;
  document.getElementById('cartTotal').textContent = formatPrice(total, region);

  list.querySelectorAll('[data-action="increase"]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      changeQty(Number(btn.getAttribute('data-id')), 1);
    });
  });
  list.querySelectorAll('[data-action="decrease"]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      changeQty(Number(btn.getAttribute('data-id')), -1);
    });
  });
  list.querySelectorAll('.cart-line__pay[aria-disabled="true"]').forEach(function (link) {
    link.addEventListener('click', function (event) { event.preventDefault(); });
  });
}

var lastFocusedElement = null;

function openCart() {
  lastFocusedElement = document.activeElement;
  document.getElementById('cartBackdrop').classList.add('is-open');
  document.getElementById('cartDrawer').classList.add('is-open');
  document.body.style.overflow = 'hidden';
  document.getElementById('cartClose').focus();
}

function closeCart() {
  document.getElementById('cartBackdrop').classList.remove('is-open');
  document.getElementById('cartDrawer').classList.remove('is-open');
  document.body.style.overflow = '';
  if (lastFocusedElement) lastFocusedElement.focus();
}

function openDetail(id) {
  var product = products.filter(function (p) { return p.id === id; })[0];
  if (!product) return;

  lastFocusedElement = document.activeElement;

  document.getElementById('detailImage').src = product.image;
  document.getElementById('detailImage').alt = product.title;
  document.getElementById('detailTitle').textContent = product.title;
  document.getElementById('detailPrice').textContent = formatPrice(product.priceEUR, currentRegion);
  document.getElementById('detailDesc').textContent = product.longDesc || product.desc;

  var badgesHtml = '';
  if (product.isNew) badgesHtml += '<span class="detail-sheet__badge detail-sheet__badge--new">Nouveau</span>';
  if (product.isTrending) badgesHtml += '<span class="detail-sheet__badge detail-sheet__badge--trend">Tendance</span>';
  document.getElementById('detailBadges').innerHTML = badgesHtml;

  var favBtn = document.getElementById('detailFav');
  var fav = isFavorite(id);
  favBtn.setAttribute('aria-pressed', fav);
  favBtn.textContent = fav ? '♥' : '♡';
  favBtn.setAttribute('data-id', id);
  document.getElementById('detailAddBtn').setAttribute('data-id', id);

  document.getElementById('detailBackdrop').classList.add('is-open');
  document.getElementById('detailSheet').classList.add('is-open');
  document.body.style.overflow = 'hidden';
  document.getElementById('detailClose').focus();
}

function closeDetail() {
  document.getElementById('detailBackdrop').classList.remove('is-open');
  document.getElementById('detailSheet').classList.remove('is-open');
  document.body.style.overflow = '';
  if (lastFocusedElement) lastFocusedElement.focus();
}

var currentRegion = 'La Réunion';

function applyCultureBanner(region) {
  var content = regions[region];
  if (!content) return;
  document.getElementById('bannerTitle').textContent = content.title;
  document.getElementById('bannerSubtitle').textContent = content.subtitle;
}

function hideOnboarding() {
  var onboarding = document.getElementById('onboarding');
  onboarding.classList.add('onboarding--closing');
  setTimeout(function () {
    onboarding.style.display = 'none';
    document.documentElement.classList.remove('needs-onboarding');
  }, 400);
}

function selectRegion(region) {
  currentRegion = region;
  storage.set(REGION_KEY, region);
  applyCultureBanner(region);
  renderProducts(region);
  renderCartDrawer(region);
  updateRegionSwitchLabel();
  hideOnboarding();
}

function updateRegionSwitchLabel() {
  var label = document.getElementById('regionSwitchLabel');
  if (label) label.textContent = currentRegion;
}

function reopenOnboarding() {
  storage.set(REGION_KEY, '');
  var onboarding = document.getElementById('onboarding');
  onboarding.classList.remove('onboarding--closing');
  onboarding.style.display = 'flex';
  document.documentElement.classList.add('needs-onboarding');
  var firstOption = document.querySelector('.onboarding__option');
  if (firstOption) firstOption.focus();
}

document.addEventListener('DOMContentLoaded', function () {
  var savedRegion = storage.get(REGION_KEY);

  if (savedRegion && regions[savedRegion]) {
    currentRegion = savedRegion;
    applyCultureBanner(savedRegion);
    renderProducts(savedRegion);
  } else {
    renderProducts(currentRegion);
    var firstOption = document.querySelector('.onboarding__option');
    if (firstOption) firstOption.focus();
  }

  updateCartBadge();
  renderCartDrawer(currentRegion);
  updateRegionSwitchLabel();

  document.querySelectorAll('.onboarding__option').forEach(function (btn) {
    btn.addEventListener('click', function () {
      selectRegion(btn.getAttribute('data-region'));
    });
  });

  document.getElementById('cartButton').addEventListener('click', openCart);
  document.getElementById('cartClose').addEventListener('click', closeCart);
  document.getElementById('cartBackdrop').addEventListener('click', closeCart);

  document.getElementById('detailClose').addEventListener('click', closeDetail);
  document.getElementById('detailBackdrop').addEventListener('click', closeDetail);

  document.getElementById('regionSwitchBtn').addEventListener('click', reopenOnboarding);

  document.getElementById('detailFav').addEventListener('click', function () {
    var id = Number(this.getAttribute('data-id'));
    toggleFavorite(id);
    var fav = isFavorite(id);
    this.setAttribute('aria-pressed', fav);
    this.textContent = fav ? '♥' : '♡';
    renderProducts(currentRegion);
  });

  document.getElementById('detailAddBtn').addEventListener('click', function () {
    var id = Number(this.getAttribute('data-id'));
    addToCart(id);
    var original = this.textContent;
    var self = this;
    self.textContent = 'Ajouté ✓';
    setTimeout(function () { self.textContent = original; }, 1200);
  });

  document.getElementById('searchInput').addEventListener('input', function (event) {
    searchTerm = event.target.value;
    renderProducts(currentRegion);
  });

  document.querySelectorAll('.chip').forEach(function (chip) {
    chip.addEventListener('click', function () {
      document.querySelectorAll('.chip').forEach(function (c) {
        c.classList.remove('is-active');
        c.setAttribute('aria-pressed', 'false');
      });
      chip.classList.add('is-active');
      chip.setAttribute('aria-pressed', 'true');
      currentFilter = chip.getAttribute('data-filter');
      renderProducts(currentRegion);
    });
  });

  document.addEventListener('keydown', function (event) {
    if (event.key !== 'Escape') return;
    if (document.getElementById('cartDrawer').classList.contains('is-open')) closeCart();
    if (document.getElementById('detailSheet').classList.contains('is-open')) closeDetail();
  });
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('/sw.js').catch(function () {});
  });
}
</script>
</body>
</html>
